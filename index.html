<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>세계 시계</title>
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
<style>
:root {
  color-scheme: light dark;
  --ui-font: "Pretendard", sans-serif;

  --bg-page: transparent;
  --text-main: #111111;
  --text-sub: #444444;
  --select-text: #111111;
  --select-label: #444444;
  --select-border: #cfcfcf;
  --select-border-hover: #b8b8b8;
  --select-border-focus: #999999;
  --select-bg: transparent;
  --option-bg: #ffffff;
  --option-text: #111111;

  --hand: #111111;
  --second-hand: #111111;
  --center-dot: #111111;
  --tick-major: rgba(17,17,17,0.9);
  --tick-minor: rgba(17,17,17,0.5);
}

@media (prefers-color-scheme: dark) {
  :root {
    --text-main: #f5f5f5;
    --text-sub: #d6d6d6;
    --select-text: #f5f5f5;
    --select-label: #d6d6d6;
    --select-border: #666666;
    --select-border-hover: #7a7a7a;
    --select-border-focus: #8d8d8d;
    --option-bg: #1e1e1e;
    --option-text: #ffffff;

    --hand: #f5f5f5;
    --second-hand: #f5f5f5;
    --center-dot: #f5f5f5;
    --tick-major: rgba(245,245,245,0.9);
    --tick-minor: rgba(245,245,245,0.5);
  }
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: var(--ui-font);
  background: transparent;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.container {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:1.5rem;
}

.clock-face {
  position:relative;
  width:min(78vw,300px);
  height:min(78vw,300px);
  border-radius:50%;
}

.hand {
  position:absolute;
  left:50%;
  bottom:50%;
  transform-origin:bottom;
  border-radius:999px;
  background:var(--hand);
}

.hand.hour { width:3px; height:72px; margin-left:-1.5px; }
.hand.minute { width:2px; height:108px; margin-left:-1px; }
.hand.second { width:1px; height:120px; margin-left:-0.5px; }

.center-dot {
  position:absolute;
  left:50%; top:50%;
  width:7px; height:7px;
  margin:-3.5px;
  border-radius:50%;
  background:var(--center-dot);
}

.digital-block {
  position:absolute;
  top:62%;
  left:50%;
  transform:translateX(-50%);
  text-align:center;
}

.time-str { font-size:26px; font-weight:500; color:var(--text-main); }
.date-str { font-size:13px; color:var(--text-sub); }

.select-area { width:min(82vw,260px); }

label { font-size:12px; color:var(--select-label); font-weight:600; }

select {
  width:100%;
  padding:9px;
  border-radius:8px;
  border:1px solid var(--select-border);
  background:transparent;
  color:var(--select-text);
}

@media (max-width:480px){
  .time-str { font-size:22px; }
}

</style>
</head>
<body>

<div class="container">

  <!-- 🔥 위로 이동됨 -->
  <div class="select-area">
    <label for="tzSel">국가 / 대표 도시</label>
    <select id="tzSel">
      <option value="Asia/Kolkata">인도 / 뉴델리</option>
      <option value="Asia/Seoul">대한민국 / 서울</option>
      <option value="Asia/Tokyo">일본 / 도쿄</option>
      <option value="Asia/Shanghai">중국 / 상하이</option>
    </select>
  </div>

  <div class="clock-face" id="clockFace">
    <div class="digital-block">
      <div class="time-str" id="timeStr"></div>
      <div class="date-str" id="dateStr"></div>
    </div>
  </div>

</div>

<script>
const face = document.getElementById("clockFace");
const tzSel = document.getElementById("tzSel");
const timeStr = document.getElementById("timeStr");
const dateStr = document.getElementById("dateStr");

// 여기에 나라를 작성
const DEFAULT_TZ = "Asia/Kolkata";

// 여기에 버전을 작성
const DEFAULT_TZ_VERSION = "2026-04-23-1";

const svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
face.appendChild(svg);

function drawTicks(){
  const size = face.clientWidth;
  const cx = size/2;
  const cy = size/2;

  svg.setAttribute("width", size);
  svg.setAttribute("height", size);
  svg.innerHTML = "";

  for(let i=0;i<12;i++){
    const rad = (i*30-90)*Math.PI/180;
    const outer = cx - size*0.03;
    const inner = outer - (i%3? size*0.03 : size*0.05);

    const line = document.createElementNS("http://www.w3.org/2000/svg","line");
    line.setAttribute("x1", cx+outer*Math.cos(rad));
    line.setAttribute("y1", cy+outer*Math.sin(rad));
    line.setAttribute("x2", cx+inner*Math.cos(rad));
    line.setAttribute("y2", cy+inner*Math.sin(rad));
    line.setAttribute("stroke","currentColor");
    svg.appendChild(line);
  }
}

function updateClock(){
  const d = new Date().toLocaleString("en-US",{timeZone:tzSel.value});
  const date = new Date(d);

  const h = date.getHours();
  const m = date.getMinutes();
  const s = date.getSeconds();

  face.querySelector(".hour").style.transform=`rotate(${h*30+m/2}deg)`;
  face.querySelector(".minute").style.transform=`rotate(${m*6}deg)`;
  face.querySelector(".second").style.transform=`rotate(${s*6}deg)`;

  timeStr.textContent = `${h}:${m}:${s}`;
  dateStr.textContent = `${date.getMonth()+1}월 ${date.getDate()}일`;
}

["hour","minute","second"].forEach(c=>{
  const el=document.createElement("div");
  el.className="hand "+c;
  face.appendChild(el);
});

drawTicks();
window.addEventListener("resize",drawTicks);
setInterval(updateClock,1000);
updateClock();
</script>

</body>
</html>
